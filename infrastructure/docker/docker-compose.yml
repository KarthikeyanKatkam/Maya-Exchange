version: '3.8'

services:
  backend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile
    container_name: maya_backend
    ports:
      - "8000:8000"
    env_file:
      - ../../backend/.env
    depends_on:
      - db
    networks:
      - maya_network

  db:
    image: postgres:15
    container_name: maya_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: maya_exchange
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - maya_network

volumes:
  postgres_data:

networks:
  maya_network:
